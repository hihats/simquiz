<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>RubyKaigi 2026 事前勉強クイズ</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <header class="header">
    <h1>RubyKaigi 2026 事前勉強クイズ</h1>
    <p>過去の RubyKaigi と 2026 タイムテーブルから、押さえておきたい知識を確認しよう</p>
  </header>

  <!-- Start screen -->
  <section id="start-screen" class="card">
    <h2>出題カテゴリを選ぶ</h2>
    <p class="muted">カテゴリを選んで「スタート」を押すと、その範囲からランダムに出題されます。</p>
    <div id="cat-list" class="cat-grid"></div>

    <h2 style="margin-top:24px;">出題数</h2>
    <div class="btn-row">
      <label class="cat-chip" style="flex:1 0 auto;">
        <input type="radio" name="qcount" value="10" checked> 10 問
      </label>
      <label class="cat-chip" style="flex:1 0 auto;">
        <input type="radio" name="qcount" value="20"> 20 問
      </label>
      <label class="cat-chip" style="flex:1 0 auto;">
        <input type="radio" name="qcount" value="all"> すべて
      </label>
    </div>

    <div class="btn-row" style="margin-top:22px;">
      <button id="start-btn" class="btn">スタート</button>
      <span id="start-info" class="muted" style="align-self:center;"></span>
    </div>
  </section>

  <!-- Quiz screen -->
  <section id="quiz-screen" class="card hidden">
    <div class="progress-info">
      <span id="progress-text">1 / 10</span>
      <span id="progress-score">正答 0</span>
    </div>
    <div class="progress"><div id="progress-bar" class="progress-bar" style="width:0%"></div></div>

    <span id="q-category" class="q-category"></span>
    <p id="q-text" class="q-text"></p>
    <div id="options" class="options"></div>
    <div id="explanation" class="explanation hidden"></div>

    <div class="quiz-footer">
      <button id="next-btn" class="btn" disabled>次へ</button>
      <button id="abort-btn" class="btn ghost">中断してトップへ</button>
    </div>
  </section>

  <!-- Result screen -->
  <section id="result-screen" class="card hidden">
    <h2 style="text-align:center;">結果</h2>
    <div id="score-big" class="score-big">0 / 0</div>
    <div id="score-sub" class="score-sub"></div>
    <div id="score-breakdown" class="score-breakdown"></div>
    <div class="btn-row" style="margin-top:22px; justify-content:center;">
      <button id="retry-btn" class="btn">もう一度</button>
      <button id="home-btn" class="btn ghost">カテゴリ選択に戻る</button>
    </div>
  </section>
</div>

<!-- Load order: data → core (pure logic) → view (DOM) → app (wiring) -->
<!-- ?v=<date> query busts browser cache on every deploy that touches JS. Bump manually. -->
<script src="js/quiz-data.js?v=20260423"></script>
<script src="js/quiz-core.js?v=20260423"></script>
<script src="js/quiz-view.js?v=20260423"></script>
<script src="js/quiz-app.js?v=20260423"></script>
</body>
</html>
